name: Check Site

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-site-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    name: Build and smoke test (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: without-ga
            measurement_id: ""
          - mode: with-test-ga
            measurement_id: G-TEST123

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build and verify site
        env:
          GA_MEASUREMENT_ID: ${{ matrix.measurement_id }}
        run: yarn check:site
